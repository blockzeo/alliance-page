<!-- 404.html 内容 -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirect to index</title>
  <script>
    // 获取当前完整的路由路径（包含 /operator 等）
    const path = window.location.pathname;
    // 跳转到根目录的 index.html，并携带原路由路径
    window.location.href = '/alliance-page/' + path.split('/alliance-page/')[1] || '';
  </script>
</head>
<body>
</body>
</html>
